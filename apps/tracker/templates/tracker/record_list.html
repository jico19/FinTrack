{% extends "base.html" %}

{% block content %}
<div class="mx-auto max-w-7xl space-y-6 pb-12">
    <header class="flex flex-col justify-between gap-4 md:flex-row md:items-end">
        <div>
            <p class="text-xs font-black text-[#66736b]">Ledger</p>
            <h1 class="mt-1 text-4xl font-black text-[#17211b]">Transaction history</h1>
            <p class="mt-2 text-sm font-medium text-[#66736b]">Search, filter, edit, and clean up your financial records.</p>
        </div>
        <button class="btn btn-primary w-full md:w-auto" onclick="add_record_modal.showModal()">Add record</button>
    </header>

    <section class="surface p-5">
        <form hx-get="{% url 'record_list' %}"
              hx-target="#records-table-container"
              hx-trigger="keyup from:#search-input delay:500ms, change from:.filter-input"
              class="grid grid-cols-1 gap-4 md:grid-cols-5">
            <label class="form-control w-full">
                <span class="label-text mb-2 text-xs font-black text-[#66736b]">Search records</span>
                <div class="relative">
                    <input type="text" id="search-input" name="search" placeholder="Note or category" class="input input-bordered w-full pl-10 text-sm font-bold">
                    <svg xmlns="http://www.w3.org/2000/svg" class="absolute left-4 top-1/2 h-4 w-4 -translate-y-1/2 text-[#66736b]" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                </div>
            </label>
            <label class="form-control w-full">
                <span class="label-text mb-2 text-xs font-black text-[#66736b]">Category</span>
                <select name="category" class="filter-input select select-bordered w-full text-sm font-bold">
                    <option value="">All Categories</option>
                    {% for cat in categories %}<option value="{{ cat.id }}">{{ cat.name }}</option>{% endfor %}
                </select>
            </label>
            <label class="form-control w-full">
                <span class="label-text mb-2 text-xs font-black text-[#66736b]">Type</span>
                <select name="type" class="filter-input select select-bordered w-full text-sm font-bold">
                    <option value="">All Types</option>
                    {% for val, label in types %}<option value="{{ val }}">{{ label }}</option>{% endfor %}
                </select>
            </label>
            <label class="form-control w-full">
                <span class="label-text mb-2 text-xs font-black text-[#66736b]">From</span>
                <input type="date" name="start_date" class="filter-input input input-bordered w-full text-sm font-bold">
            </label>
            <label class="form-control w-full">
                <span class="label-text mb-2 text-xs font-black text-[#66736b]">To</span>
                <input type="date" name="end_date" class="filter-input input input-bordered w-full text-sm font-bold">
            </label>
        </form>
    </section>

    <section id="records-table-container" class="surface overflow-hidden">
        {% include "tracker/partials/record_list_table.html" %}
    </section>
</div>

<dialog id="add_record_modal" class="modal">
    <div class="modal-box">
        <div class="mb-6 flex items-center justify-between">
            <h3 class="text-xl font-black text-[#17211b]">New transaction</h3>
            <form method="dialog"><button class="btn btn-sm btn-circle btn-ghost">x</button></form>
        </div>
        <div id="add-record-form-container" hx-get="{% url 'add_record' %}" hx-trigger="load">
            <div class="flex justify-center p-8"><span class="loading loading-spinner loading-md"></span></div>
        </div>
    </div>
    <form method="dialog" class="modal-backdrop bg-slate-900/30 backdrop-blur-sm"><button>close</button></form>
</dialog>

<dialog id="edit_record_modal" class="modal">
    <div class="modal-box">
        <div class="mb-6 flex items-center justify-between">
            <h3 class="text-xl font-black text-[#17211b]">Edit transaction</h3>
            <form method="dialog"><button class="btn btn-sm btn-circle btn-ghost">x</button></form>
        </div>
        <div id="edit-record-form-container">
            <div class="flex justify-center p-8"><span class="loading loading-spinner loading-md"></span></div>
        </div>
    </div>
    <form method="dialog" class="modal-backdrop bg-slate-900/30 backdrop-blur-sm"><button>close</button></form>
</dialog>

<script>
    document.body.addEventListener('recordAdded', function() {
        if (typeof add_record_modal !== 'undefined') add_record_modal.close();
        if (typeof edit_record_modal !== 'undefined') edit_record_modal.close();
        window.location.reload();
    });
</script>
{% endblock %}
