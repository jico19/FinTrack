<form hx-post="{% url 'edit_record' record.id %}" 
      hx-on::after-request="if(event.detail.successful) { edit_record_modal.close(); }"
      hx-swap="none"
      class="space-y-6">
    {% csrf_token %}
    
    <!-- Amount Hero Field -->
    <div class="bg-indigo-50/50 p-6 rounded-2xl border border-indigo-100/50 text-center">
        <label class="block text-[10px] font-black text-indigo-400 uppercase tracking-[0.2em] mb-2">Edit Amount</label>
        <div class="relative flex items-center justify-center">
            <span class="text-2xl font-black text-indigo-600 mr-2">₱</span>
            <input type="number" 
                   name="amount" 
                   value="{{ record.amount }}"
                   step="0.01"
                   class="bg-transparent border-none text-4xl font-black text-slate-800 placeholder-indigo-200 focus:ring-0 w-48 text-center" 
                   required>
        </div>
    </div>
    
    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
        <!-- Type Selection -->
        <div class="form-control">
            <label class="label pb-1">
                <span class="label-text font-black text-slate-400 uppercase tracking-widest text-[9px]">Record Type</span>
            </label>
            <div class="join w-full">
                <input type="radio" name="type" value="EXPENSE" aria-label="Expense" class="btn join-item flex-1 btn-sm font-bold uppercase text-[10px]" {% if record.spending_type == 'EXPENSE' %}checked{% endif %} />
                <input type="radio" name="type" value="INCOME" aria-label="Income" class="btn join-item flex-1 btn-sm font-bold uppercase text-[10px]" {% if record.spending_type == 'INCOME' %}checked{% endif %} />
            </div>
        </div>

        <!-- Date Selection -->
        <div class="form-control">
            <label class="label pb-1">
                <span class="label-text font-black text-slate-400 uppercase tracking-widest text-[9px]">Transaction Date</span>
            </label>
            <input type="date" 
                   name="date" 
                   class="input input-sm input-bordered w-full bg-slate-50 border-slate-100 font-bold text-slate-700 focus:border-indigo-600" 
                   value="{{ record.date|date:'Y-m-d' }}">
        </div>
    </div>

    <!-- Category Selection -->
    <div class="form-control">
        <label class="label pb-1">
            <span class="label-text font-black text-slate-400 uppercase tracking-widest text-[9px]">Spending Category</span>
        </label>
        <select name="category" class="select select-sm select-bordered w-full bg-slate-50 border-slate-100 font-bold text-slate-700 focus:border-indigo-600">
            {% for cat in categories %}
                <option value="{{ cat.id }}" {% if cat.id == record.category.id %}selected{% endif %}>{{ cat.name }} — {{ cat.get_classification_display }}</option>
            {% endfor %}
        </select>
    </div>

    <!-- Refined Note Field -->
    <div class="form-control">
        <label class="label pb-1">
            <span class="label-text font-black text-slate-400 uppercase tracking-widest text-[9px]">Additional Notes</span>
        </label>
        <textarea name="note" 
                  class="textarea textarea-bordered w-full bg-slate-50 border-slate-100 font-bold text-slate-700 focus:border-indigo-600 h-20 pl-4 py-3 leading-relaxed" 
                  placeholder="Update description...">{{ record.note }}</textarea>
    </div>

    <div class="pt-2">
        <button type="submit" class="btn btn-primary bg-indigo-600 border-indigo-600 hover:bg-indigo-700 w-full shadow-xl shadow-indigo-200 font-black tracking-[0.2em] uppercase h-12">
            Update Transaction
        </button>
    </div>
</form>
