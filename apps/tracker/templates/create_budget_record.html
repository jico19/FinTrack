{% extends "base.html" %}

{% block content %}
<div class="mx-auto max-w-2xl pb-12">
    <div class="mb-6">
        <p class="text-xs font-black text-[#66736b]">Transaction</p>
        <h1 class="mt-1 text-4xl font-black text-[#17211b]">Create budget record</h1>
    </div>
    <form method="post" class="surface space-y-5 p-6 md:p-8">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary w-full">Save</button>
    </form>
</div>
{% endblock %}
