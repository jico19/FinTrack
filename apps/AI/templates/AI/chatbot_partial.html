<div class="flex h-[550px] flex-col">
    <header class="mb-5 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <div class="flex h-11 w-11 items-center justify-center rounded-lg bg-[#d8f3dc] text-[#0f766e]">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
                </svg>
            </div>
            <div>
                <h4 class="font-black text-[#17211b]">Minto</h4>
                <p class="text-xs font-bold text-[#66736b]">Financial assistant</p>
            </div>
        </div>
        <form hx-post="{% url 'clear_chat' %}" hx-target="#chat-messages-container" hx-confirm="Reset this conversation?">
            {% csrf_token %}
            <button type="submit" class="btn btn-xs border-[#ded9cb] bg-transparent">Reset</button>
        </form>
    </header>

    <div id="chat-messages-container" class="custom-scrollbar flex-1 space-y-4 overflow-y-auto pr-2">
        {% include "AI/chat_messages_partial.html" %}
    </div>

    <form hx-post="{% url 'send_message' %}"
          hx-target="#chat-messages-container"
          hx-indicator="#chat-indicator"
          hx-on::after-request="this.reset()"
          class="relative mt-5">
        {% csrf_token %}
        <input type="text" name="message" id="chat-input" placeholder="Ask about spending, budgets, or goals" class="input w-full pr-24 font-bold">
        <button type="submit" class="btn btn-primary absolute right-1 top-1/2 h-10 min-h-10 -translate-y-1/2 px-4">Send</button>
        <div id="chat-indicator" class="htmx-indicator absolute -top-9 left-0 right-0 text-center text-xs font-black text-[#66736b]">
            Minto is analyzing your data...
        </div>
    </form>
</div>

<style>
    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #ded9cb; border-radius: 20px; }
</style>

<script>
    document.body.addEventListener('chatCleared', function() {
        const container = document.getElementById('chat-messages-container');
        if (container) container.innerHTML = '';
    });

    function scrollToBottom() {
        const container = document.getElementById('chat-messages-container');
        if (container) container.scrollTo({ top: container.scrollHeight, behavior: 'smooth' });
    }

    scrollToBottom();
    const observer = new MutationObserver(scrollToBottom);
    const msgContainer = document.getElementById('chat-messages-container');
    if (msgContainer) observer.observe(msgContainer, { childList: true });
</script>
