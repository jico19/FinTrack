<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>FinTrack</title>
        <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.8/dist/htmx.min.js"></script>
        <link href="https://cdn.jsdelivr.net/npm/daisyui@5"
              rel="stylesheet"
              type="text/css" />
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <style>
            :root {
                --ink: #17211b;
                --muted: #66736b;
                --paper: #f7f5ef;
                --panel: #fffefa;
                --line: #ded9cb;
                --accent: #0f766e;
                --accent-dark: #115e59;
                --danger: #b42318;
                --gain: #167647;
                --warn: #b54708;
            }

            * {
                letter-spacing: 0;
            }

            body {
                min-height: 100vh;
                color: var(--ink);
                background:
                    linear-gradient(rgba(23, 33, 27, 0.035) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(23, 33, 27, 0.035) 1px, transparent 1px),
                    var(--paper);
                background-size: 28px 28px;
                font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            }

            main {
                width: min(100%, 1500px);
            }

            .surface,
            .bg-white[class*="rounded"],
            .modal-box {
                background: var(--panel) !important;
                border: 1px solid var(--line) !important;
                border-radius: 8px !important;
                box-shadow: 0 18px 50px rgba(23, 33, 27, 0.08) !important;
            }

            .btn {
                min-height: 2.6rem;
                border-radius: 8px;
                font-weight: 800;
                text-transform: none;
            }

            .btn-primary {
                background: var(--accent) !important;
                border-color: var(--accent) !important;
                color: white !important;
            }

            .btn-primary:hover {
                background: var(--accent-dark) !important;
                border-color: var(--accent-dark) !important;
            }

            .btn-ghost {
                color: var(--ink);
            }

            .input,
            .select,
            .textarea,
            form input:not([type="checkbox"]):not([type="radio"]),
            form select,
            form textarea {
                border-radius: 8px !important;
                border-color: var(--line) !important;
                background: #fbfaf6 !important;
                color: var(--ink) !important;
                width: 100%;
            }

            .table :where(th) {
                color: var(--muted) !important;
                background: #f1eee5;
                font-size: 0.72rem !important;
            }

            .table :where(td) {
                border-color: #ebe6da !important;
            }

            .badge {
                border-radius: 999px;
                font-weight: 800;
            }

            .text-blue-600,
            .text-indigo-600,
            .text-primary {
                color: var(--accent) !important;
            }

            .bg-blue-600,
            .bg-indigo-600,
            .bg-primary {
                background-color: var(--accent) !important;
            }

            .text-red-500,
            .text-red-600 {
                color: var(--danger) !important;
            }

            .text-green-600,
            .text-green-700,
            .text-emerald-500,
            .text-emerald-600 {
                color: var(--gain) !important;
            }

            .rounded-3xl,
            .rounded-2xl,
            .rounded-xl {
                border-radius: 8px !important;
            }
        </style>
    </head>
    <body>
        {% include "navbar.html" %}

        <main class="mx-auto p-4 md:p-6 lg:p-8">
            {% block content %}{% endblock %}
        </main>
    </body>
</html>
