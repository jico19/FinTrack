{% for msg in messages %}
    <div class="flex {% if msg.role == 'user' %}justify-end{% else %}justify-start{% endif %}">
        <div class="max-w-[88%]">
            <div class="rounded-lg border p-3 text-sm font-medium leading-6 {% if msg.role == 'user' %}border-[#0f766e] bg-[#0f766e] text-white{% else %}border-[#ded9cb] bg-[#fbfaf6] text-[#17211b]{% endif %}">
                <div class="prose prose-sm max-w-none {% if msg.role == 'user' %}prose-invert{% endif %}">
                    {{ msg.content_html }}
                </div>
            </div>
            <p class="mt-1 px-1 text-[10px] font-bold text-[#66736b] {% if msg.role == 'user' %}text-right{% endif %}">
                {{ msg.created_at|date:"H:i" }}
            </p>
        </div>
    </div>
{% empty %}
    <div class="flex h-full flex-col items-center justify-center rounded-lg border border-dashed border-[#ded9cb] p-8 text-center">
        <div class="mb-4 flex h-16 w-16 items-center justify-center rounded-lg bg-[#d8f3dc] text-2xl font-black text-[#0f766e]">M</div>
        <h5 class="font-black text-[#17211b]">Welcome to Minto</h5>
        <p class="mt-2 max-w-xs text-sm font-medium leading-6 text-[#66736b]">Ask about your budget, transactions, unusual spending, or savings goals.</p>
    </div>
{% endfor %}
