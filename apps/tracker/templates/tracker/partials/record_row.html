<tr id="record-row-{{ record.id }}" class="hover:bg-slate-50 transition-colors border-b border-gray-50 group">
    <td class="text-gray-600 text-sm py-4">{{ record.date|date:"M d, Y" }}</td>
    <td class="py-4">
        <span class="font-bold text-slate-800">{{ record.category.name }}</span>
        <span class="block text-[10px] uppercase tracking-wider text-gray-400 font-bold">{{ record.category.get_classification_display }}</span>
    </td>
    <td class="text-gray-500 text-sm py-4 italic">{{ record.note|default:"—" }}</td>
    <td class="text-right py-4 font-mono font-bold {% if record.spending_type == 'INCOME' %}text-green-600{% else %}text-red-500{% endif %}">
        {% if record.spending_type == 'INCOME' %}+{% else %}-{% endif %}₱{{ record.amount }}
    </td>
    <!-- F-04: Edit/Delete Actions -->
    <td class="text-right py-4 opacity-0 group-hover:opacity-100 transition-opacity">
        <div class="flex justify-end gap-2">
            <button class="btn btn-ghost btn-xs btn-square text-blue-600" 
                    onclick="edit_record_modal.showModal()"
                    hx-get="{% url 'edit_record' record.id %}"
                    hx-target="#edit-record-form-container">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" /></svg>
            </button>
            <button class="btn btn-ghost btn-xs btn-square text-red-400 hover:text-red-600"
                    hx-post="{% url 'delete_record' record.id %}"
                    hx-confirm="Are you sure you want to delete this record?"
                    hx-target="#record-row-{{ record.id }}"
                    hx-swap="outerHTML">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-4v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
            </button>
        </div>
    </td>
</tr>
