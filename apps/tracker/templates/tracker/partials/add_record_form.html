<form hx-post="{% url 'add_record' %}" 
      hx-on::after-request="if(event.detail.successful) { document.getElementById('add_record_modal').close(); }"
      hx-swap="none"
      class="space-y-6">
    {% csrf_token %}
    
    <!-- Amount Hero Field -->
    <div class="bg-blue-50/50 p-6 rounded-2xl border border-blue-100/50 text-center">
        <label class="block text-[10px] font-black text-blue-400 uppercase tracking-[0.2em] mb-2">Transaction Amount</label>
        <div class="relative flex items-center justify-center">
            <span class="text-2xl font-black text-blue-600 mr-2">₱</span>
            <input type="number" 
                   name="amount" 
                   step="0.01"
                   class="bg-transparent border-none text-4xl font-black text-slate-800 placeholder-blue-200 focus:ring-0 w-48 text-center" 
                   placeholder="0.00" 
                   required 
                   autofocus>
        </div>
    </div>
    
    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
        <!-- Type Selection -->
        <div class="form-control">
            <label class="label pb-1">
                <span class="label-text font-black text-slate-400 uppercase tracking-widest text-[9px]">Record Type</span>
            </label>
            <div class="join w-full">
                <input type="radio" name="type" value="EXPENSE" aria-label="Expense" class="btn join-item flex-1 btn-sm font-bold uppercase text-[10px]" checked onclick="document.getElementById('category-field').style.display='block'" />
                <input type="radio" name="type" value="INCOME" aria-label="Income" class="btn join-item flex-1 btn-sm font-bold uppercase text-[10px]" onclick="document.getElementById('category-field').style.display='none'" />
            </div>
        </div>

        <!-- Date Selection -->
        <div class="form-control">
            <label class="label pb-1">
                <span class="label-text font-black text-slate-400 uppercase tracking-widest text-[9px]">Transaction Date</span>
            </label>
            <input type="date" 
                   name="date" 
                   class="input input-sm input-bordered w-full bg-slate-50 border-slate-100 font-bold text-slate-700 focus:border-blue-600" 
                   value="{{ today|date:'Y-m-d' }}">
        </div>
    </div>

    <!-- Category Selection (Conditional) -->
    <div class="form-control" id="category-field">
        <label class="label pb-1">
            <span class="label-text font-black text-slate-400 uppercase tracking-widest text-[9px]">Spending Category</span>
        </label>
        <select name="category" class="select select-sm select-bordered w-full bg-slate-50 border-slate-100 font-bold text-slate-700 focus:border-blue-600">
            {% for cat in categories %}
                <option value="{{ cat.id }}">{{ cat.name }} — {{ cat.get_classification_display }}</option>
            {% endfor %}
        </select>
    </div>

    <!-- Refined Note Field -->
    <div class="form-control">
        <label class="label pb-1">
            <span class="label-text font-black text-slate-400 uppercase tracking-widest text-[9px]">Additional Notes</span>
        </label>
        <div class="relative">
            <textarea name="note" 
                      class="textarea textarea-bordered w-full bg-slate-50 border-slate-100 font-bold text-slate-700 focus:border-blue-600 h-20 pl-4 py-3 leading-relaxed" 
                      placeholder="Add a brief description (optional)..."></textarea>
            <div class="absolute bottom-2 right-3 text-[9px] font-bold text-slate-300 uppercase tracking-tighter pointer-events-none">
                Visible in history
            </div>
        </div>
    </div>

    <div class="pt-2">
        <button type="submit" class="btn btn-primary w-full shadow-xl shadow-blue-200 font-black tracking-[0.2em] uppercase h-12">
            Confirm Transaction
        </button>
    </div>
</form>
