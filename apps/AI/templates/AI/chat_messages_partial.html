{% for msg in messages %}
    <div class="flex {% if msg.role == 'user' %}justify-end{% else %}justify-start{% endif %} animate-in fade-in slide-in-from-bottom-2 duration-300">
        <div class="max-w-[88%] space-y-1">
            <div class="p-4 shadow-sm text-sm font-medium break-words leading-relaxed
                {% if msg.role == 'user' %}
                    bg-emerald-500 text-white rounded-2xl rounded-tr-none shadow-emerald-100
                {% else %}
                    bg-slate-50 text-slate-700 rounded-2xl rounded-tl-none border border-slate-100
                {% endif %}">
                <div class="prose prose-sm max-w-none {% if msg.role == 'user' %}prose-invert{% endif %}">
                    {{ msg.content_html }}
                </div>
            </div>
            <p class="text-[8px] opacity-40 uppercase font-black tracking-widest px-1 {% if msg.role == 'user' %}text-right{% endif %}">
                {{ msg.created_at|date:"H:i" }}
            </p>
        </div>
    </div>
{% empty %}
    <div class="flex flex-col items-center justify-center h-full text-center p-8 space-y-6">
        <div class="relative">
            <div class="w-20 h-20 bg-emerald-50 rounded-full flex items-center justify-center animate-pulse">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-emerald-200" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.003 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" />
                </svg>
            </div>
            <div class="absolute -top-1 -right-1 w-6 h-6 bg-white rounded-full shadow-sm flex items-center justify-center">
                <span class="text-xs">👋</span>
            </div>
        </div>
        <div>
            <h5 class="text-xs font-black text-slate-800 uppercase tracking-widest mb-2">Welcome to Minto</h5>
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest leading-loose">
                I'm your financial AI.<br>Ask me about your budget,<br>transactions, or saving goals!
            </p>
        </div>
    </div>
{% endfor %}
