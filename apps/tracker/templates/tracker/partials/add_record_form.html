<form hx-post="{% url 'add_record' %}"
      hx-on::after-request="if(event.detail.successful) { document.getElementById('add_record_modal').close(); }"
      hx-swap="none"
      class="space-y-5">
    {% csrf_token %}

    <label class="block rounded-lg border border-[#ded9cb] bg-[#f1eee5] p-5 text-center">
        <span class="block text-xs font-black text-[#66736b]">Transaction amount</span>
        <span class="mt-2 flex items-center justify-center gap-2">
            <span class="text-2xl font-black text-[#0f766e]">&#8369;</span>
            <input type="number" name="amount" step="0.01" class="w-48 border-0 bg-transparent text-center text-4xl font-black text-[#17211b] focus:outline-none" placeholder="0.00" required autofocus>
        </span>
    </label>

    <div class="grid grid-cols-1 gap-4 md:grid-cols-2">
        <label class="block">
            <span class="mb-2 block text-xs font-black text-[#66736b]">Record type</span>
            <div class="join w-full">
                <input type="radio" name="type" value="EXPENSE" aria-label="Expense" class="btn join-item flex-1" checked onclick="document.getElementById('category-field').style.display='block'">
                <input type="radio" name="type" value="INCOME" aria-label="Income" class="btn join-item flex-1" onclick="document.getElementById('category-field').style.display='none'">
            </div>
        </label>
        <label class="block">
            <span class="mb-2 block text-xs font-black text-[#66736b]">Date</span>
            <input type="date" name="date" class="input input-bordered w-full font-bold" value="{{ today|date:'Y-m-d' }}">
        </label>
    </div>

    <label class="block" id="category-field">
        <span class="mb-2 block text-xs font-black text-[#66736b]">Category</span>
        <select name="category" class="select select-bordered w-full font-bold">
            {% for cat in categories %}
                <option value="{{ cat.id }}">{{ cat.name }} - {{ cat.get_classification_display }}</option>
            {% endfor %}
        </select>
    </label>

    <label class="block">
        <span class="mb-2 block text-xs font-black text-[#66736b]">Note</span>
        <textarea name="note" class="textarea textarea-bordered h-24 w-full font-bold" placeholder="Add a brief description"></textarea>
    </label>

    <button type="submit" class="btn btn-primary w-full">Confirm transaction</button>
</form>
