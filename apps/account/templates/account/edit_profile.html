{% extends "base.html" %}

{% block content %}
<div class="mx-auto max-w-3xl pb-12">
    <div class="mb-6">
        <p class="text-xs font-black text-[#66736b]">Account settings</p>
        <h1 class="mt-1 text-4xl font-black text-[#17211b]">Edit profile</h1>
    </div>

    <form method="post" enctype="multipart/form-data" class="surface space-y-6 p-6 md:p-8">
        {% csrf_token %}
        <div class="flex items-center gap-5">
            {% if object.profile_pic %}
                <img src="{{ object.profile_pic.url }}" class="h-20 w-20 rounded-lg border border-[#ded9cb] object-cover" alt="Current profile picture">
            {% else %}
                <div class="flex h-20 w-20 items-center justify-center rounded-lg border border-[#ded9cb] bg-[#f1eee5] text-2xl font-black text-[#66736b]">{{ request.user.username|first }}</div>
            {% endif %}
            <label class="flex-1">
                <span class="mb-2 block text-xs font-black text-[#66736b]">Profile picture</span>
                {{ form.profile_pic }}
            </label>
        </div>

        <label class="block">
            <span class="mb-2 block text-xs font-black text-[#66736b]">Bio</span>
            {{ form.bio }}
            <span class="mt-1 block text-xs font-medium text-[#66736b]">Tell us a bit about your financial goals.</span>
        </label>

        <label class="block">
            <span class="mb-2 block text-xs font-black text-[#66736b]">Monthly budget goal</span>
            {{ form.budget }}
        </label>

        <div class="flex flex-col gap-3 pt-2 sm:flex-row">
            <button type="submit" class="btn btn-primary flex-1">Save changes</button>
            <a href="{% url 'profile_view' request.user.pk %}" class="btn flex-1 border-[#ded9cb] bg-transparent">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
